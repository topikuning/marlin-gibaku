# Override transitif utk menutup advisory keamanan (CI: pnpm audit --prod --high):
#   sharp   — dedupe salinan next→sharp ke versi patched (libvips) yg sama dgn dep langsung
#   fast-uri — patch host-confusion (transitif Prisma), >=3.1.4
overrides:
  sharp: 0.35.3
  fast-uri: '>=3.1.4'
allowBuilds:
  '@prisma/engines': true
  '@node-rs/argon2': true
  esbuild: true
  exifreader: true
  prisma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@aws-sdk/client-s3@3.1086.0'
  - '@aws-sdk/credential-provider-node@3.972.67'
  - '@aws-sdk/s3-request-presigner@3.1086.0'
  - tsx@4.23.1
