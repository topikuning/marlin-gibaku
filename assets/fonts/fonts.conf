<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Konfigurasi fontconfig mandiri untuk cap foto (sharp/librsvg).
     Menjamin teks stamp tetap render walau host (mis. Railway) tak punya font. -->
<fontconfig>
  <!-- Direktori font yang dibundel bersama aplikasi. -->
  <dir prefix="default">.</dir>
  <!-- Sertakan font sistem bila ada (tidak wajib). -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <cachedir prefix="default">.fontcache</cachedir>
  <cachedir>/tmp/marlin-fontcache</cachedir>
  <!-- sans-serif → DejaVu Sans (font yang dibundel). -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>DejaVu Sans</family></prefer>
  </alias>
  <config></config>
</fontconfig>
