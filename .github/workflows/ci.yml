name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DATABASE_URL: postgresql://marlin:marlin@localhost:5432/marlin_test
  SESSION_SECRET: ci-only-secret-0123456789abcdef-0123456789abcdef
  APP_ENV: test

jobs:
  checks:
    name: Lint, typecheck, unit, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Enable corepack
        run: corepack enable
      - name: Get pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: License audit
        run: node scripts/license-audit.mjs
      - name: Security audit (prod, high+)
        run: pnpm audit --prod --audit-level high
      - name: Prisma generate
        run: pnpm db:generate
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm vitest run tests/unit
      - name: Build
        run: pnpm build

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: marlin
          POSTGRES_PASSWORD: marlin
          POSTGRES_DB: marlin_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U marlin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Migrate + generate
        run: pnpm prisma migrate deploy && pnpm db:generate
      - name: Integration tests
        run: pnpm vitest run tests/integration

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --no-cache -t marlin:ci .

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: marlin
          POSTGRES_PASSWORD: marlin
          POSTGRES_DB: marlin_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U marlin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Migrate + generate + seed
        run: pnpm prisma migrate deploy && pnpm db:generate && pnpm db:seed
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Build
        run: pnpm build
      - name: E2E
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
